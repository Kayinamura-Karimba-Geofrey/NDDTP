version: '3.9'

services:
  notification-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: nddtp-notification-service
    ports:
      - '3004:3004'
    environment:
      APP_PORT: 3004
      DB_HOST: notification-postgres
      DB_USERNAME: nddtp_notification
      DB_PASSWORD: ${DB_PASSWORD:-change_me_secure_password}
      DB_NAME: nddtp_notification
      REDIS_HOST: notification-redis
      REDIS_DB: 3
      RABBITMQ_URL: amqp://nddtp:${RABBITMQ_PASSWORD:-change_me}@notification-rabbitmq:5672
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access_secret_min_32_chars_long}
    depends_on:
      notification-postgres:
        condition: service_healthy
      notification-redis:
        condition: service_healthy
    networks:
      - nddtp-notification-network

  notification-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nddtp_notification
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_secure_password}
      POSTGRES_DB: nddtp_notification
    ports:
      - '5436:5432'
    volumes:
      - notification-postgres-data:/var/lib/postgresql/data
    networks:
      - nddtp-notification-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nddtp_notification']
      interval: 10s
      timeout: 5s
      retries: 5

  notification-redis:
    image: redis:7-alpine
    ports:
      - '6383:6379'
    networks:
      - nddtp-notification-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  notification-rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: nddtp
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-change_me}
    ports:
      - '5676:5672'
      - '15676:15672'
    networks:
      - nddtp-notification-network

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - '1025:1025'
      - '8025:8025'
    networks:
      - nddtp-notification-network

networks:
  nddtp-notification-network:
    driver: bridge

volumes:
  notification-postgres-data:
