version: '3.9'

services:
  analytics-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: nddtp-analytics-service
    ports:
      - '3025:3025'
    environment:
      APP_PORT: 3025
      DB_HOST: analytics-postgres
      DB_USERNAME: nddtp_analytics
      DB_PASSWORD: ${DB_PASSWORD:-change_me_secure_password}
      DB_NAME: nddtp_analytics
      REDIS_HOST: analytics-redis
      REDIS_DB: 24
      RABBITMQ_URL: amqp://nddtp:${RABBITMQ_PASSWORD:-change_me}@analytics-rabbitmq:5672
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access_secret_min_32_chars_long}
    depends_on:
      analytics-postgres:
        condition: service_healthy
      analytics-redis:
        condition: service_healthy
    networks:
      - nddtp-analytics-network

  analytics-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nddtp_analytics
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_secure_password}
      POSTGRES_DB: nddtp_analytics
    ports:
      - '5457:5432'
    volumes:
      - analytics-postgres-data:/var/lib/postgresql/data
    networks:
      - nddtp-analytics-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nddtp_analytics']
      interval: 10s
      timeout: 5s
      retries: 5

  analytics-redis:
    image: redis:7-alpine
    ports:
      - '6404:6379'
    networks:
      - nddtp-analytics-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  analytics-rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: nddtp
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-change_me}
    ports:
      - '5697:5672'
      - '15697:15672'
    networks:
      - nddtp-analytics-network

networks:
  nddtp-analytics-network:
    driver: bridge

volumes:
  analytics-postgres-data:
