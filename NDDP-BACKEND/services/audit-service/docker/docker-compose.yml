version: '3.9'

services:
  audit-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: nddtp-audit-service
    ports:
      - '3005:3005'
    environment:
      APP_PORT: 3005
      DB_HOST: audit-postgres
      DB_USERNAME: nddtp_audit
      DB_PASSWORD: ${DB_PASSWORD:-change_me_secure_password}
      DB_NAME: nddtp_audit
      REDIS_HOST: audit-redis
      REDIS_DB: 4
      RABBITMQ_URL: amqp://nddtp:${RABBITMQ_PASSWORD:-change_me}@audit-rabbitmq:5672
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access_secret_min_32_chars_long}
      AUDIT_INTEGRITY_SECRET: ${AUDIT_INTEGRITY_SECRET:-change_me_audit_integrity_secret_min_32_chars}
    depends_on:
      audit-postgres:
        condition: service_healthy
      audit-redis:
        condition: service_healthy
    networks:
      - nddtp-audit-network

  audit-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nddtp_audit
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_secure_password}
      POSTGRES_DB: nddtp_audit
    ports:
      - '5437:5432'
    volumes:
      - audit-postgres-data:/var/lib/postgresql/data
    networks:
      - nddtp-audit-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nddtp_audit']
      interval: 10s
      timeout: 5s
      retries: 5

  audit-redis:
    image: redis:7-alpine
    ports:
      - '6384:6379'
    networks:
      - nddtp-audit-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  audit-rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: nddtp
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-change_me}
    ports:
      - '5677:5672'
      - '15677:15672'
    networks:
      - nddtp-audit-network

networks:
  nddtp-audit-network:
    driver: bridge

volumes:
  audit-postgres-data:
