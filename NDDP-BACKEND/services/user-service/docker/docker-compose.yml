version: '3.9'

services:
  user-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: nddtp-user-service
    ports:
      - '3003:3003'
    environment:
      APP_PORT: 3003
      DB_HOST: user-postgres
      DB_USERNAME: nddtp_user
      DB_PASSWORD: ${DB_PASSWORD:-change_me_secure_password}
      DB_NAME: nddtp_user
      REDIS_HOST: user-redis
      REDIS_DB: 2
      RABBITMQ_URL: amqp://nddtp:${RABBITMQ_PASSWORD:-change_me}@user-rabbitmq:5672
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access_secret_min_32_chars_long}
    depends_on:
      user-postgres:
        condition: service_healthy
      user-redis:
        condition: service_healthy
    networks:
      - nddtp-user-network

  user-postgres:
    image: postgres:16-alpine
    container_name: nddtp-user-postgres
    environment:
      POSTGRES_USER: nddtp_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_secure_password}
      POSTGRES_DB: nddtp_user
    ports:
      - '5435:5432'
    volumes:
      - user-postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - nddtp-user-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nddtp_user -d nddtp_user']
      interval: 10s
      timeout: 5s
      retries: 5

  user-redis:
    image: redis:7-alpine
    container_name: nddtp-user-redis
    ports:
      - '6382:6379'
    networks:
      - nddtp-user-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  user-rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: nddtp-user-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: nddtp
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-change_me}
    ports:
      - '5675:5672'
      - '15675:15672'
    networks:
      - nddtp-user-network

networks:
  nddtp-user-network:
    driver: bridge

volumes:
  user-postgres-data:
