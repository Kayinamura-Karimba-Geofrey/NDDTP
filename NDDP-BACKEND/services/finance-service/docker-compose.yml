version: '3.9'

services:
  finance-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: nddtp-finance-service
    ports:
      - '3020:3020'
    environment:
      APP_PORT: 3020
      DB_HOST: finance-postgres
      DB_USERNAME: nddtp_finance
      DB_PASSWORD: ${DB_PASSWORD:-change_me_secure_password}
      DB_NAME: nddtp_finance
      REDIS_HOST: finance-redis
      REDIS_DB: 19
      RABBITMQ_URL: amqp://nddtp:${RABBITMQ_PASSWORD:-change_me}@finance-rabbitmq:5672
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access_secret_min_32_chars_long}
    depends_on:
      finance-postgres:
        condition: service_healthy
      finance-redis:
        condition: service_healthy
    networks:
      - nddtp-finance-network

  finance-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nddtp_finance
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_secure_password}
      POSTGRES_DB: nddtp_finance
    ports:
      - '5452:5432'
    volumes:
      - finance-postgres-data:/var/lib/postgresql/data
    networks:
      - nddtp-finance-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nddtp_finance']
      interval: 10s
      timeout: 5s
      retries: 5

  finance-redis:
    image: redis:7-alpine
    ports:
      - '6399:6379'
    networks:
      - nddtp-finance-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  finance-rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: nddtp
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-change_me}
    ports:
      - '5692:5672'
      - '15692:15672'
    networks:
      - nddtp-finance-network

networks:
  nddtp-finance-network:
    driver: bridge

volumes:
  finance-postgres-data:
