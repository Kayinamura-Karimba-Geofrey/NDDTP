version: '3.9'

services:
  procurement-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: nddtp-procurement-service
    ports:
      - '3016:3016'
    environment:
      APP_PORT: 3016
      DB_HOST: procurement-postgres
      DB_USERNAME: nddtp_procurement
      DB_PASSWORD: ${DB_PASSWORD:-change_me_secure_password}
      DB_NAME: nddtp_procurement
      REDIS_HOST: procurement-redis
      REDIS_DB: 15
      RABBITMQ_URL: amqp://nddtp:${RABBITMQ_PASSWORD:-change_me}@procurement-rabbitmq:5672
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access_secret_min_32_chars_long}
    depends_on:
      procurement-postgres:
        condition: service_healthy
      procurement-redis:
        condition: service_healthy
    networks:
      - nddtp-procurement-network

  procurement-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nddtp_procurement
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_secure_password}
      POSTGRES_DB: nddtp_procurement
    ports:
      - '5448:5432'
    volumes:
      - procurement-postgres-data:/var/lib/postgresql/data
    networks:
      - nddtp-procurement-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nddtp_procurement']
      interval: 10s
      timeout: 5s
      retries: 5

  procurement-redis:
    image: redis:7-alpine
    ports:
      - '6395:6379'
    networks:
      - nddtp-procurement-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  procurement-rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: nddtp
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-change_me}
    ports:
      - '5688:5672'
      - '15688:15672'
    networks:
      - nddtp-procurement-network

networks:
  nddtp-procurement-network:
    driver: bridge

volumes:
  procurement-postgres-data:
