version: '3.9'

services:
  business-intelligence-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: nddtp-business-intelligence-service
    ports:
      - '3026:3026'
    environment:
      APP_PORT: 3026
      DB_HOST: bi-postgres
      DB_USERNAME: nddtp_business_intelligence
      DB_PASSWORD: ${DB_PASSWORD:-change_me_secure_password}
      DB_NAME: nddtp_business_intelligence
      REDIS_HOST: bi-redis
      REDIS_DB: 25
      RABBITMQ_URL: amqp://nddtp:${RABBITMQ_PASSWORD:-change_me}@bi-rabbitmq:5672
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access_secret_min_32_chars_long}
    depends_on:
      bi-postgres:
        condition: service_healthy
      bi-redis:
        condition: service_healthy
    networks:
      - nddtp-bi-network

  bi-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nddtp_business_intelligence
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_secure_password}
      POSTGRES_DB: nddtp_business_intelligence
    ports:
      - '5458:5432'
    volumes:
      - bi-postgres-data:/var/lib/postgresql/data
    networks:
      - nddtp-bi-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nddtp_business_intelligence']
      interval: 10s
      timeout: 5s
      retries: 5

  bi-redis:
    image: redis:7-alpine
    ports:
      - '6405:6379'
    networks:
      - nddtp-bi-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  bi-rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: nddtp
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-change_me}
    ports:
      - '5698:5672'
      - '15698:15672'
    networks:
      - nddtp-bi-network

networks:
  nddtp-bi-network:
    driver: bridge

volumes:
  bi-postgres-data:
