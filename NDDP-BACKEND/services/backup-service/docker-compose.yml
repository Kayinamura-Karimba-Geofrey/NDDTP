version: '3.9'

services:
  backup-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: nddtp-backup-service
    ports:
      - '3033:3033'
    environment:
      APP_PORT: 3033
      DB_HOST: backup-postgres
      DB_USERNAME: nddtp_backup
      DB_PASSWORD: ${DB_PASSWORD:-change_me_secure_password}
      DB_NAME: nddtp_backup
      REDIS_HOST: backup-redis
      REDIS_DB: 32
      RABBITMQ_URL: amqp://nddtp:${RABBITMQ_PASSWORD:-change_me}@backup-rabbitmq:5672
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access_secret_min_32_chars_long}
    depends_on:
      backup-postgres:
        condition: service_healthy
      backup-redis:
        condition: service_healthy
    networks:
      - nddtp-backup-network

  backup-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nddtp_backup
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_secure_password}
      POSTGRES_DB: nddtp_backup
    ports:
      - '5465:5432'
    volumes:
      - backup-postgres-data:/var/lib/postgresql/data
    networks:
      - nddtp-backup-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nddtp_backup']
      interval: 10s
      timeout: 5s
      retries: 5

  backup-redis:
    image: redis:7-alpine
    ports:
      - '6412:6379'
    networks:
      - nddtp-backup-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backup-rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: nddtp
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-change_me}
    ports:
      - '5705:5672'
      - '15705:15672'
    networks:
      - nddtp-backup-network

networks:
  nddtp-backup-network:
    driver: bridge

volumes:
  backup-postgres-data:
